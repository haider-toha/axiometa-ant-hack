# pnpm 11's build-script decisions. The pnpm-10 keys (ignoredBuiltDependencies,
# or a `pnpm` block in package.json) are no longer honoured at install time, so
# CI's `CI=true pnpm install --frozen-lockfile` failed with
# ERR_PNPM_IGNORED_BUILDS until the decision was recorded in this form.
# false = never run their postinstall scripts: both ship prebuilt binaries as
# optional dependencies, so the scripts are unnecessary. Verified against a
# fresh worktree install on pnpm 11.9.0.
packages:
  - "."

allowBuilds:
  sharp: false
  unrs-resolver: false
