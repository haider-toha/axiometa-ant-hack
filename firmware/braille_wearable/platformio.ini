; ==========================================================================
;  Axiometa Genesis Mini · ESP32-S3-MINI-1 · Navigation prototype
;  PlatformIO project config · verified 2026-07-18
; ==========================================================================
;
;  Build the firmware:   pio run                         (current integrated target)
;                        pio run -e board_firmware       (same explicit target)
;                        pio run -e pdm_mic_experiment   (isolated microphone gate)
;  Run the host test:    pio test -e native
;
;  The default is the current integrated board firmware. The two genesis_mini
;  environments below are retained only as legacy speech/braille provenance.
;  `native` is deliberately not in default_envs.

[platformio]
default_envs = board_firmware

; --------------------------------------------------------------------------
;  Settings shared by every on-device (ESP32-S3) build env
; --------------------------------------------------------------------------
[esp32_common]
board          = esp32-s3-devkitm-1     ; Closest PlatformIO board definition; flash overrides match Genesis Mini hardware.
framework      = arduino
monitor_speed  = 115200
upload_speed   = 921600
board_upload.flash_size   = 4MB
board_upload.maximum_size = 4194304
board_build.partitions    = default.csv

; --- Serial over the native USB-C port (built-in USB-Serial/JTAG CDC) ------
;   USB_MODE=1        -> "Hardware CDC and JTAG" (HWCDC), not TinyUSB/OTG
;   USB_CDC_ON_BOOT=1 -> the global `Serial` object talks to USB CDC at boot
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; --- Libraries (registry names + version pins, per 1C §d) ------------------
;   WiFi / WiFiClientSecure / HTTPClient / SPI / Wire are BUILT INTO the esp32
;   Arduino core — they are NOT listed here.
;   ArduinoJson is pinned to v7: the firmware uses `JsonDocument` (not the
;   deprecated StaticJsonDocument<N>) per the 1C v6->v7 migration verdict.
lib_deps =
    bblanchon/ArduinoJson@^7.4.3
    adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
    adafruit/Adafruit GFX Library@^1.12.6
    adafruit/Adafruit BusIO@^1.17.4
    mathertel/RotaryEncoder@^1.6.0

; --------------------------------------------------------------------------
; LEGACY SPEECH/BRAILLE env. It is not a current build or verification target.
; Kept so historical work remains inspectable without renaming its environment.
; --------------------------------------------------------------------------
[env:genesis_mini]
extends  = esp32_common
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
; Pinned/reproducible alternative:
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip

; --------------------------------------------------------------------------
; BUZZER-ONLY EXPERIMENT — isolated from the legacy speech/braille firmware.
; Two AX22-0018 modules: Port 1 IO1 = GPIO3, Port 3 IO1 = GPIO16.
; Build/upload only this source with Arduino-ESP32 3.x LEDC tone APIs.
; --------------------------------------------------------------------------
[env:buzzer_experiment]
board          = esp32-s3-devkitm-1
framework      = arduino
platform       = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
monitor_speed  = 115200
upload_speed   = 921600
board_upload.flash_size   = 4MB
board_upload.maximum_size = 4194304
board_build.partitions    = default.csv
build_src_filter =
    -<*>
    +<buzzer_experiment.cpp>
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; --------------------------------------------------------------------------
; TOF PROXIMITY EXPERIMENT — isolated local-safety path.
; P2 AX22-0015: SDA=GPIO10, SCL=GPIO11, XSHUT=GPIO6.
; P1/P3 remain the low/high audio proxies for future vibration channels.
; --------------------------------------------------------------------------
[env:tof_experiment]
board          = esp32-s3-devkitm-1
framework      = arduino
platform       = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
monitor_speed  = 115200
upload_speed   = 921600
board_upload.flash_size   = 4MB
board_upload.maximum_size = 4194304
board_build.partitions    = default.csv
build_src_filter =
    -<*>
    +<tof_experiment.cpp>
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    adafruit/Adafruit_VL53L0X@1.2.5

; --------------------------------------------------------------------------
; PDM MICROPHONE EXPERIMENT — isolated PCM health gate before siren FFT work.
; P4 AX22-0044: CLK=GPIO18, DT=GPIO17, SL=GPIO1 driven high.
; ESP-IDF names the pulled-high lane I2S_PDM_SLOT_RIGHT.
; --------------------------------------------------------------------------
[env:pdm_mic_experiment]
board          = esp32-s3-devkitm-1
framework      = arduino
platform       = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
monitor_speed  = 115200
upload_speed   = 921600
board_upload.flash_size   = 4MB
board_upload.maximum_size = 4194304
board_build.partitions    = default.csv
build_src_filter =
    -<*>
    +<pdm_mic_experiment.cpp>
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; --------------------------------------------------------------------------
; INTEGRATED BOARD FIRMWARE — current physical workstream.
; Boots in WAITING mode with local ToF active. Serial commands temporarily
; stand in for future phone STILL/MOVING and navigation relay messages.
; --------------------------------------------------------------------------
[env:board_firmware]
board          = esp32-s3-devkitm-1
framework      = arduino
platform       = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
monitor_speed  = 115200
upload_speed   = 921600
board_upload.flash_size   = 4MB
board_upload.maximum_size = 4194304
board_build.partitions    = default.csv
build_src_filter =
    -<*>
    +<main.cpp>
    +<haptic.cpp>
    +<tof.cpp>
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    adafruit/Adafruit_VL53L0X@1.2.5

; --------------------------------------------------------------------------
; LEGACY OFFLINE SPEECH/BRAILLE env. Not a current verification target.
; --------------------------------------------------------------------------
[env:genesis_mini_offline]
extends  = esp32_common
platform = espressif32@7.0.1

; --------------------------------------------------------------------------
;  HOST unit-test env — runs pure C++ (the braille table) on the Mac, no board.
;  Needs Xcode Command Line Tools. Run: pio test -e native
;  Does NOT extend esp32_common (no ESP32 flags / no ESP32 libs). The braille
;  logic under test is Arduino-free (inline brailleMask in braille.h); src/ is
;  not built during tests, so the Arduino-dependent .cpp files are never seen.
; --------------------------------------------------------------------------
[env:native]
platform       = native
test_framework = unity
build_flags    = -std=gnu++17 -I src
