# pnpm 10+ reads settings from this file; the legacy `pnpm` key in
# package.json is no longer honoured by pnpm 11, which is why CI failed with
# ERR_PNPM_IGNORED_BUILDS despite the same list living there. sharp and
# unrs-resolver ship prebuilt binaries as optional dependencies, so their
# postinstall scripts stay skipped — this records that as an explicit
# decision instead of an unanswered warning that CI escalates to an error.
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
