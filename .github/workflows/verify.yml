name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: www
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20.20.0
          cache: pnpm
          cache-dependency-path: www/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Type-check
        run: pnpm exec tsc --noEmit
      - name: Lint
        run: pnpm run lint
      - name: Build
        run: pnpm run build

  firmware:
    name: Firmware
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: firmware/braille_wearable
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: python -m pip install platformio==6.1.19
      - name: Run native tests
        run: pio test -e native
      - name: Build integrated firmware
        run: pio run -e board_firmware
